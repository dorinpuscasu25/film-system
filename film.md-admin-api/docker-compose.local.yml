  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: film-md-admin-api-queue
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: ['php', 'artisan', 'queue:work', '--queue=default,analytics', '--tries=1', '--timeout=0']
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: film-md-admin-api-scheduler
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    command: ['sh', '-lc', 'while true; do php artisan schedule:run --no-interaction; sleep 60; done']
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: film-md-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-film_md}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-film_md}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5433:5432'
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  db-init:
    image: postgres:16-alpine
    container_name: film-md-db-init
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "until pg_isready -h postgres -p 5432 -U \"$DB_USERNAME\" -d \"$DB_DATABASE\"; do sleep 2; done; if ! PGPASSWORD=\"$DB_PASSWORD\" psql -h postgres -p 5432 -U \"$DB_USERNAME\" -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname='${ANALYTICS_DB_DATABASE:-film_md_analytics}'\" | grep -q 1; then PGPASSWORD=\"$DB_PASSWORD\" createdb -h postgres -p 5432 -U \"$DB_USERNAME\" \"${ANALYTICS_DB_DATABASE:-film_md_analytics}\"; fi"
      ]
    restart: "no"

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: film-md-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    restart: unless-stopped
    volumes:
      - meilisearch_data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: film-md-redis
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  meilisearch_data:
  redis_data:
